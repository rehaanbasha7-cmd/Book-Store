<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Book Store</title>
        <style>
            :root {
                --accent: #ff4757;
                --dark: #1e1e2f;
                --card-bg: #ffffff;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(
                    160deg,
                    #1e1e2f 0%,
                    #2d2b55 40%,
                    #e0e7ff 100%
                );
                min-height: 100vh;
                color: #2f3542;
            }

            /* ── NAV ── */
            nav {
                position: sticky;
                top: 0;
                z-index: 100;
                background: rgba(30, 30, 47, 0.95);
                backdrop-filter: blur(8px);
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 14px 40px;
            }

            .nav-logo {
                color: #fff;
                font-size: 22px;
                font-weight: 700;
                letter-spacing: 1px;
            }

            .nav-controls {
                display: flex;
                gap: 12px;
                align-items: center;
            }

            .btn-link {
                background: var(--accent);
                color: #fff;
                border: none;
                border-radius: 8px;
                padding: 10px 22px;
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                text-decoration: none;
                display: flex;
                align-items: center;
                gap: 8px;
                transition: background 0.2s;
            }

            .btn-link:hover {
                background: #e84055;
            }

            .cart-count {
                background: #fff;
                color: var(--accent);
                border-radius: 50%;
                width: 22px;
                height: 22px;
                font-size: 12px;
                font-weight: 700;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            /* ── HERO ── */
            .hero {
                text-align: center;
                padding: 70px 20px 50px;
                color: #fff;
            }

            .hero h1 {
                font-size: clamp(28px, 5vw, 52px);
                font-weight: 800;
                letter-spacing: 2px;
                margin-bottom: 12px;
            }

            .hero p {
                font-size: 18px;
                opacity: 0.8;
                margin-bottom: 28px;
            }

            .search-bar {
                display: flex;
                justify-content: center;
                gap: 0;
            }

            .search-bar input {
                padding: 12px 18px;
                width: 320px;
                border-radius: 8px 0 0 8px;
                border: none;
                font-size: 15px;
                outline: none;
            }

            .search-bar button {
                padding: 12px 24px;
                border-radius: 0 8px 8px 0;
                border: none;
                background: var(--accent);
                color: white;
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
            }

            /* ── SECTIONS ── */
            .container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 20px 30px 60px;
            }

            .section-title {
                color: #fff;
                font-size: 26px;
                font-weight: 700;
                text-align: center;
                margin: 40px 0 24px;
                letter-spacing: 1px;
            }

            .book-grid {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 24px;
            }

            /* ── BOOK CARD ── */
            .book-card {
                background: var(--card-bg);
                border-radius: 14px;
                overflow: hidden;
                width: 200px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
                transition:
                    transform 0.3s ease,
                    box-shadow 0.3s ease;
                cursor: pointer;
                display: flex;
                flex-direction: column;
            }

            .book-card:hover {
                transform: translateY(-8px) scale(1.03);
                box-shadow: 0 18px 40px rgba(0, 0, 0, 0.32);
            }

            .book-card img {
                width: 200px;
                height: 280px;
                object-fit: cover;
                display: block;
            }

            .book-card .book-info {
                padding: 12px 14px;
                flex: 1;
                display: flex;
                flex-direction: column;
                gap: 6px;
            }

            .book-card .book-title {
                font-size: 14px;
                font-weight: 700;
                color: #2f3542;
                line-height: 1.3;
            }

            .book-card .book-author {
                font-size: 12px;
                color: #747d8c;
            }

            .book-card .price-row {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-top: 2px;
            }

            .book-card .price-old {
                text-decoration: line-through;
                color: #a4b0be;
                font-size: 13px;
            }

            .book-card .price-new {
                color: var(--accent);
                font-weight: 700;
                font-size: 16px;
            }

            .add-to-cart-btn {
                width: 100%;
                padding: 10px;
                background: var(--accent);
                color: #fff;
                border: none;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
                transition: background 0.2s;
            }

            .add-to-cart-btn:hover {
                background: #e84055;
            }

            .add-to-cart-btn.added {
                background: #2ed573;
            }

            /* ── TOAST ── */
            #toast {
                position: fixed;
                bottom: 30px;
                right: 30px;
                background: #2ed573;
                color: #1a3a2a;
                padding: 14px 24px;
                border-radius: 10px;
                font-size: 15px;
                font-weight: 600;
                opacity: 0;
                transform: translateY(20px);
                transition:
                    opacity 0.3s,
                    transform 0.3s;
                z-index: 9999;
                pointer-events: none;
            }

            #toast.show {
                opacity: 1;
                transform: translateY(0);
            }
        </style>
    </head>
    <body>
        <nav>
            <div class="nav-logo">📚 BookStore</div>
            <div class="nav-controls">
                <a class="btn-link" href="main.html">⬅ Back</a>
                <a class="btn-link" href="cart.html">
                    🛒 Cart
                    <span class="cart-count" id="cartCount">0</span>
                </a>
            </div>
        </nav>

        <header class="hero">
            <h1>READING IS THE BEST</h1>
            <p>Explore our latest collection of bestsellers and hidden gems.</p>
            <div class="search-bar">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search for books..."
                />
                <button onclick="filterBooks()">Search</button>
            </div>
        </header>

        <main class="container">
            <h2 class="section-title">⭐ Featured Books</h2>
            <div class="book-grid" id="featuredGrid"></div>

            <h2 class="section-title">🔥 Flash Sale</h2>
            <div class="book-grid" id="saleGrid"></div>

            <h2 class="section-title">🆕 Latest Release</h2>
            <div class="book-grid" id="latestGrid"></div>
        </main>

        <div id="toast">✓ Added to cart!</div>

        <script>
            const books = {
                featured: [
                    {
                        id: "f1",
                        title: "Game of Thrones",
                        author: "George R.R. Martin",
                        img: "game1.png",
                        price: 599,
                        oldPrice: null,
                    },
                    {
                        id: "f2",
                        title: "A Clash of Kings",
                        author: "George R.R. Martin",
                        img: "game2.png",
                        price: 549,
                        oldPrice: null,
                    },
                    {
                        id: "f3",
                        title: "Harry Potter & Sorcerer's Stone",
                        author: "J.K. Rowling",
                        img: "harry1.jpg",
                        price: 499,
                        oldPrice: null,
                    },
                    {
                        id: "f4",
                        title: "Harry Potter & Chamber of Secrets",
                        author: "J.K. Rowling",
                        img: "harry2.png",
                        price: 499,
                        oldPrice: null,
                    },
                ],
                sale: [
                    {
                        id: "s1",
                        title: "Atomic Habits",
                        author: "James Clear",
                        img: "latest1.jpg",
                        price: 499,
                        oldPrice: 999,
                    },
                    {
                        id: "s2",
                        title: "The Alchemist",
                        author: "Paulo Coelho",
                        img: "latest2.jfif",
                        price: 399,
                        oldPrice: 799,
                    },
                    {
                        id: "s3",
                        title: "Sapiens",
                        author: "Yuval Noah Harari",
                        img: "latest3.png",
                        price: 699,
                        oldPrice: 1199,
                    },
                    {
                        id: "s4",
                        title: "Ikigai",
                        author: "Héctor García",
                        img: "book1.png",
                        price: 449,
                        oldPrice: 899,
                    },
                ],
                latest: [
                    {
                        id: "n1",
                        title: "Fourth Wing",
                        author: "Rebecca Yarros",
                        img: "New1.png",
                        price: 599,
                        oldPrice: 1099,
                    },
                    {
                        id: "n2",
                        title: "Happy Place",
                        author: "Emily Henry",
                        img: "new2.png",
                        price: 499,
                        oldPrice: 899,
                    },
                    {
                        id: "n3",
                        title: "Rich Dad Poor Dad",
                        author: "Robert Kiyosaki",
                        img: "new3.png",
                        price: 749,
                        oldPrice: 1299,
                    },
                    {
                        id: "n4",
                        title: "The Psychology of Money",
                        author: "Morgan Housel",
                        img: "new4.png",
                        price: 549,
                        oldPrice: 999,
                    },
                ],
            };

            function getCart() {
                return JSON.parse(localStorage.getItem("bookCart") || "[]");
            }

            function saveCart(cart) {
                localStorage.setItem("bookCart", JSON.stringify(cart));
                updateCartCount();
            }

            function updateCartCount() {
                const cart = getCart();
                const total = cart.reduce((s, i) => s + i.qty, 0);
                document.getElementById("cartCount").textContent = total;
            }

            function addToCart(book, btn) {
                const cart = getCart();
                const existing = cart.find((i) => i.id === book.id);
                if (existing) {
                    existing.qty += 1;
                } else {
                    cart.push({ ...book, qty: 1 });
                }
                saveCart(cart);

                btn.textContent = "✓ Added!";
                btn.classList.add("added");
                setTimeout(() => {
                    btn.textContent = "Add to Cart";
                    btn.classList.remove("added");
                }, 1500);

                showToast(`"${book.title}" added to cart!`);
            }

            function showToast(msg) {
                const t = document.getElementById("toast");
                t.textContent = "✓ " + msg;
                t.classList.add("show");
                setTimeout(() => t.classList.remove("show"), 2200);
            }

            function buildCard(book) {
                const priceHtml = book.oldPrice
                    ? `<span class="price-old">₹${book.oldPrice}</span><span class="price-new">₹${book.price}</span>`
                    : `<span class="price-new">₹${book.price}</span>`;

                const div = document.createElement("div");
                div.className = "book-card";
                div.dataset.title = book.title.toLowerCase();
                div.dataset.author = book.author.toLowerCase();
                div.innerHTML = `
        <img src="${book.img}" alt="${book.title}" loading="lazy" />
        <div class="book-info">
            <div class="book-title">${book.title}</div>
            <div class="book-author">${book.author}</div>
            <div class="price-row">${priceHtml}</div>
        </div>
        <button class="add-to-cart-btn">Add to Cart</button>
    `;
                div.querySelector(".add-to-cart-btn").addEventListener(
                    "click",
                    (e) => {
                        e.stopPropagation();
                        addToCart(book, e.currentTarget);
                    },
                );
                return div;
            }

            function renderGrid(containerId, list) {
                const container = document.getElementById(containerId);
                list.forEach((b) => container.appendChild(buildCard(b)));
            }

            function filterBooks() {
                const q = document
                    .getElementById("searchInput")
                    .value.toLowerCase()
                    .trim();
                document.querySelectorAll(".book-card").forEach((card) => {
                    const match =
                        card.dataset.title.includes(q) ||
                        card.dataset.author.includes(q);
                    card.style.display = match ? "" : "none";
                });
            }

            document
                .getElementById("searchInput")
                .addEventListener("keyup", filterBooks);

            renderGrid("featuredGrid", books.featured);
            renderGrid("saleGrid", books.sale);
            renderGrid("latestGrid", books.latest);
            updateCartCount();
        </script>
    </body>
</html>
