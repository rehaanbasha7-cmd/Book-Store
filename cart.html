<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Shopping Cart – BookStore</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background: #f0f2f5;
                min-height: 100vh;
                color: #2f3542;
            }

            /* ── NAV ── */
            nav {
                background: #1e1e2f;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 14px 40px;
            }

            .nav-logo {
                color: #fff;
                font-size: 22px;
                font-weight: 700;
                text-decoration: none;
            }

            .back-btn {
                background: transparent;
                border: 2px solid rgba(255, 255, 255, 0.4);
                color: #fff;
                padding: 8px 20px;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                text-decoration: none;
                transition: border-color 0.2s;
            }

            .back-btn:hover {
                border-color: #fff;
            }

            /* ── LAYOUT ── */
            .page {
                max-width: 960px;
                margin: 32px auto;
                padding: 0 20px 60px;
                display: grid;
                grid-template-columns: 1fr 320px;
                gap: 24px;
                align-items: start;
            }

            @media (max-width: 720px) {
                .page {
                    grid-template-columns: 1fr;
                }
            }

            h2.cart-heading {
                font-size: 26px;
                font-weight: 700;
                margin-bottom: 20px;
                color: #1e1e2f;
            }

            /* ── CART ITEM ── */
            .cart-item {
                background: #fff;
                border-radius: 12px;
                padding: 16px;
                margin-bottom: 14px;
                display: flex;
                align-items: center;
                gap: 16px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
                transition: opacity 0.3s;
            }

            .cart-item img {
                width: 72px;
                height: 100px;
                object-fit: cover;
                border-radius: 6px;
                flex-shrink: 0;
            }

            .item-details {
                flex: 1;
            }

            .item-title {
                font-size: 16px;
                font-weight: 700;
                margin-bottom: 4px;
            }

            .item-author {
                font-size: 13px;
                color: #747d8c;
                margin-bottom: 8px;
            }

            .item-price {
                color: #ff4757;
                font-weight: 700;
                font-size: 16px;
            }

            /* ── QTY CONTROLS ── */
            .qty-controls {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .qty-btn {
                width: 30px;
                height: 30px;
                border-radius: 6px;
                border: 1.5px solid #dfe4ea;
                background: #f1f2f6;
                font-size: 18px;
                line-height: 1;
                cursor: pointer;
                font-weight: 700;
                color: #2f3542;
                transition: background 0.15s;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .qty-btn:hover {
                background: #e0e7ff;
            }

            .qty-value {
                font-size: 16px;
                font-weight: 700;
                min-width: 24px;
                text-align: center;
            }

            .item-total {
                font-size: 17px;
                font-weight: 700;
                color: #2f3542;
                min-width: 70px;
                text-align: right;
            }

            .remove-btn {
                background: none;
                border: none;
                cursor: pointer;
                font-size: 20px;
                color: #a4b0be;
                padding: 4px;
                transition: color 0.2s;
            }

            .remove-btn:hover {
                color: #ff4757;
            }

            /* ── EMPTY STATE ── */
            .empty-state {
                text-align: center;
                padding: 60px 20px;
                color: #747d8c;
            }

            .empty-state .icon {
                font-size: 64px;
                margin-bottom: 16px;
            }
            .empty-state h3 {
                font-size: 22px;
                margin-bottom: 8px;
                color: #2f3542;
            }

            .shop-link {
                display: inline-block;
                margin-top: 20px;
                background: #ff4757;
                color: #fff;
                padding: 12px 28px;
                border-radius: 8px;
                font-weight: 700;
                text-decoration: none;
                font-size: 15px;
            }

            /* ── SUMMARY ── */
            .summary-card {
                background: #fff;
                border-radius: 14px;
                padding: 24px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
                position: sticky;
                top: 20px;
            }

            .summary-card h3 {
                font-size: 18px;
                font-weight: 700;
                margin-bottom: 20px;
                padding-bottom: 14px;
                border-bottom: 1.5px solid #f1f2f6;
            }

            .summary-row {
                display: flex;
                justify-content: space-between;
                font-size: 15px;
                margin-bottom: 12px;
                color: #57606f;
            }

            .summary-row.total {
                font-size: 20px;
                font-weight: 700;
                color: #2f3542;
                margin-top: 16px;
                padding-top: 16px;
                border-top: 1.5px solid #f1f2f6;
            }

            .summary-row.total span:last-child {
                color: #ff4757;
            }

            .coupon-row {
                display: flex;
                gap: 8px;
                margin: 16px 0;
            }

            .coupon-row input {
                flex: 1;
                padding: 9px 12px;
                border: 1.5px solid #dfe4ea;
                border-radius: 7px;
                font-size: 14px;
                outline: none;
            }

            .coupon-row input:focus {
                border-color: #ff4757;
            }

            .coupon-btn {
                padding: 9px 14px;
                background: #1e1e2f;
                color: #fff;
                border: none;
                border-radius: 7px;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
            }

            .checkout-btn {
                width: 100%;
                padding: 15px;
                background: #ff4757;
                color: #fff;
                border: none;
                border-radius: 10px;
                font-size: 16px;
                font-weight: 700;
                cursor: pointer;
                margin-top: 8px;
                transition: background 0.2s;
                letter-spacing: 0.5px;
            }

            .checkout-btn:hover {
                background: #e84055;
            }

            .secure-note {
                text-align: center;
                font-size: 12px;
                color: #a4b0be;
                margin-top: 12px;
            }
        </style>
    </head>
    <body>
        <nav>
            <a class="nav-logo" href="book.html">📚 BookStore</a>
            <a class="back-btn" href="book.html">← Continue Shopping</a>
        </nav>

        <div class="page">
            <!-- LEFT: cart items -->
            <div>
                <h2 class="cart-heading">
                    Shopping Cart
                    <span
                        id="itemCountLabel"
                        style="
                            font-size: 16px;
                            color: #747d8c;
                            font-weight: 400;
                        "
                    ></span>
                </h2>
                <div id="cartContainer"></div>
            </div>

            <!-- RIGHT: summary -->
            <div class="summary-card" id="summaryCard" style="display: none">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span
                    ><span>₹<span id="subtotal">0</span></span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span
                    ><span style="color: #2ed573; font-weight: 600">FREE</span>
                </div>
                <div class="summary-row">
                    <span>Tax (8%)</span><span>₹<span id="tax">0</span></span>
                </div>
                <div class="coupon-row">
                    <input
                        type="text"
                        id="couponInput"
                        placeholder="Coupon code"
                    />
                    <button class="coupon-btn" onclick="applyCoupon()">
                        Apply
                    </button>
                </div>
                <div
                    class="summary-row"
                    id="discountRow"
                    style="display: none; color: #2ed573"
                >
                    <span>Discount</span
                    ><span>−₹<span id="discount">0</span></span>
                </div>
                <div class="summary-row total">
                    <span>Total</span
                    ><span>₹<span id="grandTotal">0</span></span>
                </div>
                <button class="checkout-btn" onclick="checkout()">
                    PROCEED TO CHECKOUT
                </button>
                <p class="secure-note">🔒 Secure checkout · Free returns</p>
            </div>
        </div>

        <script>
            let discountAmount = 0;
            const COUPONS = { SAVE10: 0.1, READ20: 0.2, BOOKS5: 0.05 };

            function getCart() {
                return JSON.parse(localStorage.getItem("bookCart") || "[]");
            }

            function saveCart(cart) {
                localStorage.setItem("bookCart", JSON.stringify(cart));
            }

            function renderCart() {
                const cart = getCart();
                const container = document.getElementById("cartContainer");
                const summary = document.getElementById("summaryCard");
                container.innerHTML = "";

                if (cart.length === 0) {
                    summary.style.display = "none";
                    document.getElementById("itemCountLabel").textContent = "";
                    container.innerHTML = `
            <div class="empty-state">
                <div class="icon">🛒</div>
                <h3>Your cart is empty</h3>
                <p>Looks like you haven't added any books yet.</p>
                <a class="shop-link" href="bookstore.html">Browse Books</a>
            </div>`;
                    return;
                }

                summary.style.display = "block";
                document.getElementById("itemCountLabel").textContent =
                    `(${cart.reduce((s, i) => s + i.qty, 0)} item${cart.reduce((s, i) => s + i.qty, 0) > 1 ? "s" : ""})`;

                cart.forEach((item, idx) => {
                    const div = document.createElement("div");
                    div.className = "cart-item";
                    div.id = "item_" + idx;
                    div.innerHTML = `
            <img src="${item.img}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/72x100?text=Book'" />
            <div class="item-details">
                <div class="item-title">${item.title}</div>
                <div class="item-author">${item.author}</div>
                <div class="item-price">₹${item.price}</div>
            </div>
            <div class="qty-controls">
                <button class="qty-btn" onclick="changeQty(${idx}, -1)">−</button>
                <span class="qty-value" id="qty_${idx}">${item.qty}</span>
                <button class="qty-btn" onclick="changeQty(${idx}, 1)">+</button>
            </div>
            <div class="item-total" id="itemTotal_${idx}">₹${(item.price * item.qty).toLocaleString()}</div>
            <button class="remove-btn" onclick="removeItem(${idx})" title="Remove">✕</button>
        `;
                    container.appendChild(div);
                });

                updateSummary();
            }

            function changeQty(idx, delta) {
                const cart = getCart();
                cart[idx].qty += delta;
                if (cart[idx].qty < 1) cart[idx].qty = 1;
                saveCart(cart);
                document.getElementById("qty_" + idx).textContent =
                    cart[idx].qty;
                document.getElementById("itemTotal_" + idx).textContent =
                    "₹" + (cart[idx].price * cart[idx].qty).toLocaleString();
                updateSummary();
                document.getElementById("itemCountLabel").textContent =
                    `(${cart.reduce((s, i) => s + i.qty, 0)} items)`;
            }

            function removeItem(idx) {
                const cart = getCart();
                const el = document.getElementById("item_" + idx);
                if (el) {
                    el.style.opacity = "0";
                }
                setTimeout(() => {
                    cart.splice(idx, 1);
                    saveCart(cart);
                    renderCart();
                }, 280);
            }

            function updateSummary() {
                const cart = getCart();
                const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
                const afterDiscount = subtotal - discountAmount;
                const tax = afterDiscount * 0.08;
                const total = afterDiscount + tax;

                document.getElementById("subtotal").textContent =
                    subtotal.toLocaleString();
                document.getElementById("tax").textContent =
                    Math.round(tax).toLocaleString();
                document.getElementById("grandTotal").textContent =
                    Math.round(total).toLocaleString();
            }

            function applyCoupon() {
                const code = document
                    .getElementById("couponInput")
                    .value.trim()
                    .toUpperCase();
                const cart = getCart();
                const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);

                if (COUPONS[code]) {
                    discountAmount = Math.round(subtotal * COUPONS[code]);
                    document.getElementById("discountRow").style.display =
                        "flex";
                    document.getElementById("discount").textContent =
                        discountAmount.toLocaleString();
                    document.getElementById("couponInput").style.borderColor =
                        "#2ed573";
                    updateSummary();
                    alert(
                        `Coupon applied! You saved ₹${discountAmount} (${COUPONS[code] * 100}% off)`,
                    );
                } else {
                    document.getElementById("couponInput").style.borderColor =
                        "#ff4757";
                    alert(
                        "Invalid coupon code. Try: SAVE10, READ20, or BOOKS5",
                    );
                }
            }

            function checkout() {
                const cart = getCart();
                if (!cart.length) return;
                const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
                const tax = (total - discountAmount) * 0.08;
                const grand = Math.round(total - discountAmount + tax);
                alert(
                    `🎉 Order placed successfully!\n\nTotal paid: ₹${grand.toLocaleString()}\nThank you for shopping at BookStore!`,
                );
                localStorage.removeItem("bookCart");
                renderCart();
            }

            renderCart();
        </script>
    </body>
</html>
