<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Home</title>

        <style>
            body {
                margin: 0;
                font-family: Arial;
            }

            .navbar {
                display: flex;
                justify-content: flex-end;
                align-items: center;
                padding: 15px 30px;
                background: #2563eb;
                color: white;
            }

            .user {
                margin-right: 20px;
            }

            .logout {
                padding: 8px 12px;
                border: none;
                border-radius: 6px;
                background: white;
                color: #2563eb;
                cursor: pointer;
            }

            .logout:hover {
                background: #ddd;
            }

            .content {
                text-align: center;
                margin-top: 100px;
            }
        </style>
    </head>

    <body>
        <div class="navbar">
            <div class="user" id="userEmail"></div>
            <button class="logout" onclick="logout()">Logout</button>
        </div>

        <div class="content">
            <h1>Welcome 🎉</h1>
        </div>

        <script>
            const user = localStorage.getItem("loggedInUser");

            if (!user) {
                window.location.href = "login.html";
            } else {
                document.getElementById("userEmail").innerText = user;
            }

            function logout() {
                localStorage.removeItem("loggedInUser");
                window.location.href = "login.html";
            }
        </script>
    </body>
</html>
