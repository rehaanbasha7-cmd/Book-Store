<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login Page</title>
        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background-color: #e5e5e5;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }
            .container {
                background: #f3f3f3;
                padding: 40px;
                border-radius: 12px;
                width: 350px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            }
            h1 {
                text-align: center;
                margin-bottom: 10px;
            }
            .subtitle {
                text-align: center;
                color: #555;
                margin-bottom: 25px;
            }
            label {
                display: block;
                margin-top: 15px;
                font-size: 14px;
                color: #333;
            }
            input[type="email"],
            input[type="password"] {
                width: 100%;
                padding: 12px;
                margin-top: 5px;
                border-radius: 8px;
                border: 1px solid #ccc;
                outline: none;
                box-sizing: border-box;
            }
            input:focus {
                border-color: #2563eb;
            }
            .btn {
                width: 100%;
                margin-top: 20px;
                padding: 12px;
                background: #2563eb;
                border: none;
                border-radius: 8px;
                color: white;
                font-size: 16px;
                cursor: pointer;
                transition: 0.3s;
            }
            .btn:hover {
                background: #1e4ed8;
            }
            .bottom-text {
                text-align: center;
                margin-top: 20px;
                font-size: 14px;
            }
            .bottom-text a {
                color: #2563eb;
                text-decoration: none;
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Welcome Back</h1>
            <div class="subtitle">Sign in with any account</div>

            <form id="loginForm">
                <label>Email Address</label>
                <input
                    type="email"
                    id="email"
                    placeholder="you@example.com"
                    required
                />

                <label>Password</label>
                <input
                    type="password"
                    id="password"
                    placeholder="••••••••"
                    required
                />

                <button type="submit" class="btn">Sign In</button>
            </form>

            <div class="bottom-text">
                Don't have an account? <a href="#">Sign up</a>
            </div>
        </div>

        <script>
            document
                .getElementById("loginForm")
                .addEventListener("submit", function (e) {
                    e.preventDefault();

                    const email = document.getElementById("email").value;
                    const password = document.getElementById("password").value;

                    // Validation: Just ensure they aren't empty
                    if (email === "" || password === "") {
                        alert("Please fill all fields!");
                        return;
                    }

                    // Accept ANY login: Store the email and redirect
                    localStorage.setItem("loggedInUser", email);

                    // Redirect to your main home page
                    window.location.href = "index.html";
                });
        </script>
    </body>
</html>
