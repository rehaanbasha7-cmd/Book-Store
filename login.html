<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Signin</title>
        <style>
            /* (Styles remain the same as your provided code) */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: Arial, sans-serif;
            }
            body {
                height: 100vh;
                background: #eef1f7;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .container {
                width: 380px;
                background: #fff;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
                text-align: center;
            }
            .icon {
                width: 60px;
                height: 60px;
                background: #e6e9ff;
                border-radius: 50%;
                margin: 0 auto 15px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 24px;
            }
            h2 {
                margin-bottom: 8px;
            }
            .subtitle {
                color: #666;
                font-size: 14px;
                margin-bottom: 20px;
            }
            .input-group {
                text-align: left;
                margin-bottom: 15px;
            }
            .input-group label {
                font-size: 14px;
                display: block;
                margin-bottom: 6px;
            }
            .input-box {
                position: relative;
            }
            .input-box input {
                width: 100%;
                padding: 10px 40px 10px 35px;
                border-radius: 8px;
                border: 1px solid #ddd;
                outline: none;
                font-size: 14px;
            }
            .input-box i {
                position: absolute;
                top: 50%;
                transform: translateY(-50%);
                color: #aaa;
            }
            .input-box .left {
                left: 10px;
            }
            .input-box .right {
                right: 10px;
                cursor: pointer;
            }
            .options {
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 13px;
                margin-bottom: 15px;
            }
            .options a {
                color: #5a4bff;
                text-decoration: none;
            }
            .btn {
                width: 100%;
                padding: 10px;
                border: none;
                border-radius: 8px;
                background: linear-gradient(to right, #5a4bff, #7a5cff);
                color: white;
                font-size: 15px;
                cursor: pointer;
                margin-bottom: 20px;
            }
            .divider {
                display: flex;
                align-items: center;
                margin: 15px 0;
                color: #aaa;
                font-size: 13px;
            }
            .divider::before,
            .divider::after {
                content: "";
                flex: 1;
                height: 1px;
                background: #ddd;
            }
            .divider span {
                margin: 0 10px;
            }
            .socials {
                display: flex;
                gap: 10px;
                margin-bottom: 20px;
            }
            .socials button {
                flex: 1;
                padding: 10px;
                border-radius: 8px;
                border: 1px solid #ddd;
                background: #fff;
                cursor: pointer;
            }
            .footer {
                font-size: 13px;
            }
            .footer a {
                color: #5a4bff;
                text-decoration: none;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="icon">🔒</div>
            <h2>Welcome Back</h2>
            <div class="subtitle">Sign in to your account to continue</div>

            <div class="input-group">
                <label>Email</label>
                <div class="input-box">
                    <i class="left">📧</i>
                    <input
                        type="email"
                        id="emailInput"
                        placeholder="you@example.com"
                        required
                    />
                </div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="input-box">
                    <i class="left">🔒</i>
                    <input
                        type="password"
                        id="password"
                        placeholder="Enter your password"
                        required
                    />
                    <i class="right" onclick="togglePassword()">👁️</i>
                </div>
            </div>

            <div class="options">
                <label><input type="checkbox" /> Remember me</label>
                <a href="#">Forgot password?</a>
            </div>

            <button class="btn" onclick="login()">Sign In</button>

            <div class="divider"><span>Or continue with</span></div>
            <div class="socials">
                <button>Google</button>
                <button>GitHub</button>
            </div>
            <div class="footer">
                Don't have an account? <a href="#">Sign up</a>
            </div>
        </div>

        <script>
            function togglePassword() {
                const input = document.getElementById("password");
                input.type = input.type === "password" ? "text" : "password";
            }

            function login() {
                const email = document.getElementById("emailInput").value;
                const password = document.getElementById("password").value;

                if (email === "" || password === "") {
                    alert("Please fill all fields!");
                    return;
                }

                // Successfully "log in" by saving the email to localStorage
                localStorage.setItem("loggedInUser", email);

                // Redirect to the home page (index.html)
                window.location.href = "index.html";
            }
        </script>
    </body>
</html>
