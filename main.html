<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Book Stores</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: Arial, sans-serif;
            }
            body {
                background: #f5f5f5;
            }
            .navbar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 15px 50px;
                background: #fff;
                border-bottom: 1px solid #ddd;
            }
            .logo {
                font-size: 20px;
                font-weight: bold;
            }
            .nav-links {
                display: flex;
                gap: 25px;
            }
            .nav-links a {
                text-decoration: none;
                color: #333;
                font-size: 15px;
                transition: 0.3s;
                padding: 5px 10px;
                border-radius: 5px;
            }
            .nav-links a:hover {
                background-color: grey;
                color: white;
            }
            .auth-buttons {
                display: flex;
                gap: 10px;
                align-items: center;
            }
            .btn {
                padding: 8px 15px;
                border: none;
                cursor: pointer;
                border-radius: 5px;
                transition: 0.3s;
            }
            .signin {
                background: transparent;
                border: 1px solid #333;
            }
            .register {
                background: #0a0a23;
                color: white;
            }
            .logout-btn {
                background: #ff4d4d;
                color: white;
            }
            .logout-btn:hover {
                background: #cc0000;
            }
            .hero {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 60px 80px;
            }
            .hero-text {
                max-width: 50%;
            }
            .hero-text h1 {
                font-size: 48px;
                margin-bottom: 20px;
            }
            .hero-text p {
                font-size: 16px;
                color: #555;
            }
            .hero img {
                width: 400px;
                border-radius: 10px;
            }
            .stats {
                display: flex;
                justify-content: space-around;
                align-items: center;
                background-color: #eaeaea;
                padding: 40px 20px;
                margin-top: 40px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div class="navbar">
            <div class="logo">📖 Book Store</div>
            <div class="nav-links">
                <a href="#">Home</a>
                <a href="book.html">Books</a>
                <a href="cart.html">Cart</a>
                <a href="contact.html">Contact</a>
            </div>

            <div class="auth-buttons" id="authArea">
                <a href="login.html"
                    ><button class="btn signin">Sign In</button></a
                >
                <a href="log.html"
                    ><button class="btn register">Login</button></a
                >
            </div>
        </div>

        <div class="hero">
            <div class="hero-text">
                <h1>
                    Welcome to <br />
                    LibraryHub
                </h1>
                <p>
                    Discover the world of knowledge at your fingertips.Browse
                    thousands of books, manage your reading list, and connect
                    with a community of readers.
                </p>
            </div>
            <img src="library.jfif" alt="Library Image" />
        </div>

        <div class="stats">
            <div class="stat-box">
                <h2>50K+</h2>
                <p>Books Available</p>
            </div>
            <div class="stat-box">
                <h2>200+</h2>
                <p>Daily Visitors</p>
            </div>
            <div class="stat-box">
                <h2>15K+</h2>
                <p>Active Members</p>
            </div>
            <div class="stat-box">
                <h2>98%</h2>
                <p>Satisfaction Rate</p>
            </div>
        </div>

        <script>
            // This function runs every time the page loads
            window.onload = function () {
                const userEmail = localStorage.getItem("loggedInUser");
                const authArea = document.getElementById("authArea");

                if (userEmail) {
                    // Update the UI to show the email and logout button
                    authArea.innerHTML = `
                        <div style="display:flex; align-items:center; gap:12px;">
                            <span style="
                                background:#2563eb; color:white;
                                width: 32px; height: 32px; display: flex;
                                align-items: center; justify-content: center;
                                border-radius:50%; font-size:14px; font-weight: bold;
                            ">${userEmail.charAt(0).toUpperCase()}</span>
                            <span style="font-size:14px; color: #333; font-weight: bold;">${userEmail}</span>
                            <button class="btn logout-btn" onclick="logout()">Logout</button>
                        </div>
                    `;
                }
            };

            function logout() {
                localStorage.removeItem("loggedInUser");
                window.location.reload(); // Refresh to show Sign In buttons again
            }
        </script>
    </body>
</html>
